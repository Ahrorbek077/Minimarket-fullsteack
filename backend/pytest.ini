[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
pythonpath = . apps
python_files = tests/test_*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
markers =
    slow: sekin ishlaydigan testlar
    integration: integratsiya testlari
